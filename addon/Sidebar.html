<!doctype html>
<html>
  <head>
    <base target="_top" />
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 14px; color: #111; }
      h2 { font-size: 16px; margin: 0 0 6px; }
      p.sub { color: #666; font-size: 12px; margin: 0 0 14px; }
      label { font-size: 12px; color: #444; display: block; margin-top: 10px; }
      select, input, button { width: 100%; padding: 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-top: 4px; }
      button.primary { background: #0b74de; color: white; border: 0; cursor: pointer; margin-top: 12px; }
      button.primary:hover { background: #095fb8; }
      .url { background: #f5f5f5; padding: 8px; font-family: monospace; font-size: 11px; border-radius: 6px; word-break: break-all; margin-top: 6px; }
      .row { display: flex; gap: 6px; margin-top: 6px; }
      .row > button { width: auto; padding: 6px 10px; font-size: 11px; }
      a { color: #0b74de; }
      .empty { padding: 10px; background: #fff7e0; border: 1px solid #f0d273; border-radius: 6px; font-size: 12px; margin-top: 10px; }
    </style>
  </head>
  <body>
    <h2>SheetsAPI</h2>
    <p class="sub">Turn <b><?= spreadsheetName ?></b> into a REST API.</p>

    <div id="not-connected" class="empty" style="display: none;">
      This sheet isn't connected yet. Open the dashboard to finish setup.
      <div style="margin-top: 8px;">
        <a href="<?= dashboardUrl ?>/connect?spreadsheet_id=<?= spreadsheetId ?>" target="_blank">Open Dashboard →</a>
      </div>
    </div>

    <div id="connected" style="display: none;">
      <label>Tab</label>
      <select id="tab">
        <? for (var i = 0; i < sheetNames.length; i++) { ?>
          <option value="<?= sheetNames[i] ?>"><?= sheetNames[i] ?></option>
        <? } ?>
      </select>

      <label>Endpoint</label>
      <div class="url" id="url"></div>
      <div class="row">
        <button onclick="copy()">Copy URL</button>
        <button onclick="copyCurl()">Copy curl</button>
      </div>

      <button class="primary" onclick="openDash()">Manage in Dashboard</button>
    </div>

    <script>
      var apiBase = '<?= apiBase ?>';
      var dashUrl = '<?= dashboardUrl ?>';
      var userKey = localStorage.getItem('sheetsapi_userKey');

      if (!userKey) {
        document.getElementById('not-connected').style.display = 'block';
      } else {
        document.getElementById('connected').style.display = 'block';
        update();
        document.getElementById('tab').addEventListener('change', update);
      }

      function update() {
        var tab = document.getElementById('tab').value;
        document.getElementById('url').textContent =
          apiBase + '/api/spreadsheets/' + userKey + '/' + encodeURIComponent(tab);
      }

      function copy() {
        var u = document.getElementById('url').textContent;
        navigator.clipboard.writeText(u);
      }

      function copyCurl() {
        var u = document.getElementById('url').textContent;
        navigator.clipboard.writeText("curl '" + u + "'");
      }

      function openDash() {
        window.open(dashUrl, '_blank');
      }
    </script>
  </body>
</html>
